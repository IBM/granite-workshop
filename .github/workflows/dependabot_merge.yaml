name: "Dependabot PR auto-merge"

on:
  pull_request_target:
    branches:
      - 'main'

env:
  LC_ALL: en_US.UTF-8

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  auto-merge:
    if: ${{ github.event.pull_request.user.login == 'dependabot[bot]' && github.repository == 'ibm/granite-workshop' }}
    permissions:
      pull-requests: write
      contents: write
    name: "Check auto-merge"
    runs-on: ubuntu-latest
    steps:
      - name: "Fetch Dependabot Metadata"
        id: dependabot-metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: "Wait for PR checks"
        id: wait-for-pr-checks
        if: ${{ contains(fromJSON('["version-update:semver-minor","version-update:semver-patch"]'), steps.dependabot-metadata.outputs.update-type) }}
        run: |
          ./.github/scripts/wait-for-pr-checks.sh
        env:
          PR: ${{github.event.pull_request.html_url}}
          GH_TOKEN: ${{secrets.GITHUB_TOKEN}}
      - name: "Auto Merge"
        if: ${{ steps.wait-for-pr-checks.outcome == 'success' }}
        run: |
          gh pr merge "$PR" --auto --merge
        env:
          PR: ${{github.event.pull_request.html_url}}
          GH_TOKEN: ${{secrets.GITHUB_TOKEN}}
